<section class="py-20 bg-gray-50">
  <div class="max-w-7xl mx-auto px-6">
    <div class="flex flex-col lg:flex-row items-stretch justify-center gap-16">
      
      <div class="w-full lg:w-1/2 hidden lg:block">
      
        <div class="relative h-full min-h-[400px] overflow-hidden rounded-3xl group">
          <img src="conta.jpg" 
               alt="Contact Support" 
               class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
          
          <div class="absolute inset-0 bg-gradient-to-t from-blue-900/80 to-transparent flex flex-col justify-end p-10 text-white">
            <h3 class="text-2xl font-bold mb-2 text-white">আমাদের সাথে সরাসরি কথা বলুন</h3>
            <p class="text-blue-100 opacity-90">আপনার প্রতিষ্ঠানের জন্য সঠিক সমাধানটি বেছে নিতে আমাদের টিম সবসময় প্রস্তুত।</p>
          </div>
        </div>
      </div>
      

      <div class="w-full lg:w-1/2">
        <div class="bg-white p-8 md:p-10 rounded-3xl shadow-xl border border-gray-100">
          <h2 class="text-3xl font-black text-slate-900 mb-6">যোগাযোগ করুন</h2>
          
          <form class="space-y-5">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">আপনার নাম</label>
                <input type="text" placeholder="নাম লিখুন" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-50 outline-none transition-all">
              </div>
              <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">ফোন নম্বর</label>
                <input type="tel" placeholder="017XXXXXXXX" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-50 outline-none transition-all">
              </div>
            </div>

            <div>
              <label class="block text-sm font-bold text-slate-700 mb-2">আগ্রহের বিষয় নির্বাচন করুন</label>
              <div class="relative">
              <select class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-50 outline-none transition-all appearance-none cursor-pointer bg-white">
                <option value="" disabled selected>আপনার প্রতিষ্ঠানের ধরন বেছে নিন</option>
                <option value="kindergarten">কিন্ডারগার্টেন স্কুল (KG School)</option>
                <option value="high-school">হাই স্কুল (High School)</option>
                <option value="college">কলেজ (College)</option>
                <option value="madrasa">মাদ্রাসা (Madrasa)</option>
                <option value="coaching">কোচিং সেন্টার (Coaching Center)</option>
                <option value="polytechnic">পলিটেকনিক ইনস্টিটিউট</option>
                <option value="university">ইউনিভার্সিটি (University)</option>
                <option value="other">অন্যান্য প্রতিষ্ঠান</option>
                </select>
                <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none">
                  <i class="fas fa-chevron-down text-gray-400 text-xs"></i>
                </div>
              </div>
            </div>

            <div>
              <label class="block text-sm font-bold text-slate-700 mb-2">আপনার মেসেজ</label>
              <textarea rows="4" placeholder="বিস্তারিত লিখুন..." class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-50 outline-none transition-all resize-none"></textarea>
            </div>

            <button type="submit" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-black rounded-xl shadow-lg transition-all active:scale-95">
              সাবমিট করুন
            </button>
          </form>
        </div>
      </div>

    </div>
  </div>
</section>
