<section class="py-20 bg-gray-50">
  <div class="max-w-7xl mx-auto px-6">
    <div class="flex flex-col lg:flex-row items-stretch justify-center gap-16">
      
      <div class="w-full lg:w-1/2 hidden lg:block">
        <div class="relative h-full min-h-[500px] overflow-hidden rounded-3xl group shadow-2xl">
          <img src="conta.jpg" 
               alt="Contact Support" 
               class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
          
          <div class="absolute inset-0 bg-gradient-to-t from-blue-900/90 via-blue-900/20 to-transparent flex flex-col justify-end p-10 text-white">
            <h3 class="text-3xl font-bold mb-3 text-white">আমাদের সাথে সরাসরি কথা বলুন</h3>
            <p class="text-blue-100 opacity-90 text-lg">আপনার প্রতিষ্ঠানের জন্য সঠিক সমাধানটি বেছে নিতে আমাদের টিম সবসময় প্রস্তুত।</p>
          </div>
        </div>
      </div>

      <div class="w-full lg:w-1/2">
        <div class="bg-white p-8 md:p-10 rounded-3xl shadow-xl border border-gray-100">
          <h2 class="text-3xl font-black text-slate-900 mb-6">যোগাযোগ করুন</h2>
          
          <form class="space-y-5">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">আপনার নাম</label>
                <input type="text" placeholder="নাম লিখুন" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-50 outline-none transition-all">
              </div>
              
              <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">ফোন নম্বর</label>
                <input type="tel" placeholder="017XXXXXXXX" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-50 outline-none transition-all">
              </div>

              <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">বিভাগ (Division)</label>
                <input type="text" placeholder="বিভাগ লিখুন" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-50 outline-none transition-all">
              </div>

              <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">জেলা (District)</label>
                <input type="text" placeholder="জেলা লিখুন" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-50 outline-none transition-all">
              </div>

              <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">থানা (Thana)</label>
                <input type="text" placeholder="থানা লিখুন" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-50 outline-none transition-all">
              </div>

              <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">এলাকা (Area)</label>
                <input type="text" placeholder="এলাকার নাম লিখুন" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-50 outline-none transition-all">
              </div>
            </div>

            <div>
              <label class="block text-sm font-bold text-slate-700 mb-2">আপনার মেসেজ</label>
              <textarea rows="4" placeholder="আপনার প্রতিষ্ঠানের বিস্তারিত বা প্রশ্ন লিখুন..." class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-50 outline-none transition-all resize-none"></textarea>
            </div>

            <button type="submit" class="w-full py-4 bg-gradient-primary hover:bg-blue-700 text-white font-black rounded-xl shadow-lg shadow-blue-200 transition-all active:scale-95 transform">
              সাবমিট করুন
            </button>
          </form>
        </div>
      </div>

    </div>
  </div> 
</section>
