<section class="bg-gray-50 py-16 px-4">
  <div class="max-w-6xl mx-auto">
    
    <div class="text-center mb-12">
      <h2 class="text-3xl md:text-4xl font-bold text-[#002B7F] inline-block relative pb-2">
        কেন এডুমান বেছে নেবেন?
        <span class="absolute bottom-0 left-0 w-full h-1 bg-orange-500 rounded-full"></span>
      </h2>
    </div>

    <div class="flex flex-col lg:flex-row items-center justify-between gap-12">
      
      <div class="w-full lg:w-3/5 space-y-5">
        @for (reason of reasons; track $index) {
          <div class="flex items-center bg-white p-4 rounded-xl shadow-sm border border-gray-100 transform transition hover:-translate-y-1 hover:shadow-md">
            <div class="flex-shrink-0 w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center mr-4">
              <i [class]="reason.icon" class="text-[#002B7F] text-xl"></i>
            </div>
            <p class="text-gray-800 font-medium text-lg">{{ reason.text }}</p>
          </div>
        }
      </div>

      <div class="w-full lg:w-2/5 flex justify-center">
        <div class="relative group">
          <img src="Box-2.png" alt="Eduman Software" class="max-w-full h-auto drop-shadow-2xl group-hover:scale-105 transition-transform duration-300">
        </div>
      </div>
    </div>

    <div class="text-center mt-16">
      <button class="bg-[#002B7F] cursor-pointer text-white px-10 py-4 rounded-lg font-bold text-xl hover:bg-blue-900 transition-all shadow-xl active:scale-95">
        লাইভ ডেমো দেখুন <i class="fas fa-external-link-alt ml-2 text-sm"></i>
      </button>
    </div>

  </div>
</section>
